    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: notificacoes
    environment:
      PORT: 4006
      JWT_SECRET: athlos-super-secret-change-in-prod
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/athlos_notificacoes
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    ports:
      - "4006:4006"
    command: >
      sh -c "
        npx drizzle-kit migrate &&
        npm run start:prod
      "

  user-auth:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: user-auth
    environment:
      PORT: 4007
      JWT_SECRET: athlos-super-secret-change-in-prod
